name: slang

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  #########
  # Slang #
  #########
  slang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bender
        uses: pulp-platform/pulp-actions/bender-install@v2.5.0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Generate RTL
        run: uv run floogen rtl -c floogen/examples/nw_mesh_xy.yml -o generated --no-format

      - name: Generate bender file list
        # TODO: Remove -e fpnew once fpnew_top.sv is fixed upstream.
        run: bender script flist-plus -t floo_synth -t nw_mesh -e fpnew > sources.f

      - name: Slang lint
        uses: pulp-platform/pulp-actions/slang@v2.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          slang-flags: >-
            -f sources.f --top floo_nw_mesh_noc
            --ignore-unknown-modules
            -Wno-finish-num
            --suppress-warnings .bender
